<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Посещаемость</title>
    <script src="xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .controls { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        button { background: #4a90e2; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: 600; }
        .back-btn { background: #6c757d; width: auto; }
        h2 { margin-top: 0; color: #333; }
        input[type="date"] { padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="back-btn" onclick="window.location.href='index.html'">← Назад</button>
        <label>С:</label>
        <input type="date" id="date-start" onchange="renderStats()">
        <label>По:</label>
        <input type="date" id="date-end" onchange="renderStats()">
    </div>

    <h1>Статистика посещаемости</h1>
    <div id="stats-container" class="stats-grid"></div>

    <script>
        // 1. Проверка авторизации
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) {
            window.location.href = 'login.html'; 
        }

        const dateStart = document.getElementById('date-start');
        const dateEnd = document.getElementById('date-end');
        
        // Установка дат по умолчанию (текущий месяц)
        const now = new Date();
        dateStart.value = new Date(now.getFullYear(), now.getMonth(), 2).toISOString().split('T')[0];
        dateEnd.value = now.toISOString().split('T')[0];

        // Вспомогательная функция для получения всех дат в диапазоне
        function getDatesRange(start, end) {
            let arr = [];
            let dt = new Date(start);
            let endDate = new Date(end);
            while (dt <= endDate) {
                arr.push(new Date(dt).toISOString().split('T')[0]);
                dt.setDate(dt.getDate() + 1);
            }
            return arr;
        }

        function renderStats() {
            const container = document.getElementById('stats-container');
            const dates = getDatesRange(dateStart.value, dateEnd.value);
            container.innerHTML = '';

            const groups = JSON.parse(localStorage.getItem('my_groups')) || ['8', '9', '10'];

            groups.forEach(g => {
                let list = JSON.parse(localStorage.getItem('ch_' + g)) || [];
                let at = JSON.parse(localStorage.getItem('at_' + g)) || {};
                
                let total = list.filter(c => c.active !== false).length;
                let totalPresent = 0;
                
                // Суммируем посещаемость за все дни периода
                dates.forEach(d => {
                    if(at[d]) totalPresent += Object.values(at[d]).filter(s => s === 'Я').length;
                });

                container.innerHTML += `
                    <div class="card">
                        <h2>Группа ${g}</h2>
                        <p>Списочный состав: <b>${total}</b></p>
                        <p>Всего посещений (Я): <b>${totalPresent}</b></p>
                        <button onclick="downloadGroupExcel('${g}')">Скачать табель за период</button>
                    </div>
                `;
            });
        }

        function downloadGroupExcel(g) {
            const dates = getDatesRange(dateStart.value, dateEnd.value);
            let list = JSON.parse(localStorage.getItem('ch_' + g)) || [];
            let at = JSON.parse(localStorage.getItem('at_' + g)) || {};
            
            let data = [["ФИО ребенка", ...dates]];
            
            list.filter(c => c.active !== false).forEach(c => {
                let row = [c.name];
                dates.forEach(d => {
                    row.push(at[d] ? (at[d][c.id] || "") : "");
                });
                data.push(row);
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, "Табель");
            XLSX.writeFile(wb, `Табель_Гр${g}_${dateStart.value}_по_${dateEnd.value}.xlsx`);
        }

        renderStats();
    </script>
</body>
</html>
