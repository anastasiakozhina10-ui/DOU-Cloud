<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главное меню системы</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 320px; }
        button { display: block; width: 100%; margin: 15px 0; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; color: white; font-size: 15px; }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }
        h1 { margin-bottom: 25px; color: #2c3e50; }
        
        /* Стили для окон ввода пароля и управления реестром паролей */
        .password-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 340px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); max-height: 85vh; overflow-y: auto; }
        .modal-content h3 { margin-top: 0; color: #2c3e50; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; outline: none; }
        .modal-content input:focus { border-color: #e67e22; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .modal-buttons button { margin: 0; padding: 10px; font-size: 14px; }

        /* Стили для таблицы паролей внутри админки */
        .pwd-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .pwd-table th, .pwd-table td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        .pwd-table th { background: #f8f9fa; }
        .pwd-table input { margin: 0; padding: 5px; font-size: 13px; text-align: left; border: 1px solid #ccc; }
        .btn-save-pwd { background: #2ecc71; padding: 4px 8px; font-size: 12px; width: auto; display: inline-block; margin: 0; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Группа: <span id="group-name"></span></h1>
        
        <button style="background:#4a90e2;" onclick="window.location.href='attendance.html'">Табель посещаемости</button>
        
        <div id="teacher-panel" style="display:none;">
            <button style="background:#2ecc71;" onclick="window.location.href='teacher_view.html'">Журнал группы (Контакты) →</button>
        </div>
        
        <div id="admin-panel" style="display:none;">
            <button style="background:#e67e22;" onclick="checkAdminAccess('admin_all_children.html')">Реестр детей (Перенос/Отчисление)</button>
            <button style="background:#8e44ad;" onclick="checkAdminAccess('admin_menu.html')">Панель настроек админа</button>
            
            <button style="background:#34495e;" onclick="checkAdminAccess('manage_passwords')">🔑 Управление паролями</button>
            
            <button style="background:#27ae60;" onclick="checkAdminAccess('create_group')">+ Создать группу</button>
            <button style="background:#cc0000;" onclick="checkAdminAccess('delete_group')">- Удалить группу</button>
        </div>

        <button style="background:#ff4d4d; margin-top: 30px;" onclick="logout()">Выход из системы</button>
    </div>

    <div id="pwd-modal" class="password-modal">
        <div class="modal-content">
            <h3>Доступ ограничен</h3>
            <p style="font-size: 14px; color: #7f8c8d; margin: 0;">Введите мастер-пароль администратора:</p>
            <input type="password" id="admin-password-input" placeholder="••••">
            <div class="modal-buttons">
                <button style="background: #27ae60;" onclick="verifyPassword()">Войти</button>
                <button style="background: #6c757d;" onclick="closePasswordModal()">Отмена</button>
            </div>
        </div>
    </div>

    <div id="manage-pwd-modal" class="password-modal">
        <div class="modal-content" style="width: 400px;">
            <h3>Реестр паролей системы</h3>
            <p style="font-size: 13px; color: #7f8c8d; margin-bottom: 10px;">Здесь вы можете изменить текущие пароли доступа.</p>
            
            <table class="pwd-table">
                <thead>
                    <tr>
                        <th>Роль / Группа</th>
                        <th>Текущий пароль</th>
                        <th>Действие</th>
                    </tr>
                </thead>
                <tbody id="passwords-table-body">
                    </tbody>
            </table>

            <div class="modal-buttons">
                <button style="background: #6c757d; width: 100%;" onclick="document.getElementById('manage-pwd-modal').style.display='none'">Закрыть реестр</button>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('currentUser'));
        let pendingAction = null;

        // Инициализация базы паролей в localStorage, если её еще нет
        if (!localStorage.getItem('system_passwords')) {
            const defaultPasswords = {
                "admin": "admin123",  // Мастер-пароль администратора
                "8": "1234",          // Стартовые пароли групп по умолчанию
                "9": "1234",
                "10": "1234"
            };
            localStorage.setItem('system_passwords', JSON.stringify(defaultPasswords));
        }

        // 1. Проверка авторизации
        if (!user) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('group-name').innerText = user.group === 'admin' ? 'Администратор' : user.group;
            
            if (user.group === 'admin') {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('teacher-panel').style.display = 'none';
            } else {
                document.getElementById('teacher-panel').style.display = 'block';
                document.getElementById('admin-panel').style.display = 'none';
                localStorage.setItem('last_teacher_group', user.group);
            }
        }

        // 2. Проверка доступа в админ-функции
        function checkAdminAccess(action) {
            if (sessionStorage.getItem('admin_authenticated') === 'true') {
                executeAdminAction(action);
            } else {
                pendingAction = action;
                document.getElementById('pwd-modal').style.display = 'flex';
                document.getElementById('admin-password-input').value = '';
                document.getElementById('admin-password-input').focus();
            }
        }

        // 3. Верификация мастер-пароля администратора
        function verifyPassword() {
            const enteredPassword = document.getElementById('admin-password-input').value;
            const savedPasswords = JSON.parse(localStorage.getItem('system_passwords'));
            
            if (enteredPassword === savedPasswords["admin"]) {
                sessionStorage.setItem('admin_authenticated', 'true');
                closePasswordModal();
                executeAdminAction(pendingAction);
            } else {
                alert("Неверный мастер-пароль! Доступ заблокирован.");
                document.getElementById('admin-password-input').value = '';
            }
        }

        function closePasswordModal() {
            document.getElementById('pwd-modal').style.display = 'none';
            pendingAction = null;
        }

        // 4. Выполнение действий администратора
        function executeAdminAction(action) {
            if (action.endsWith('.html')) {
                window.location.href = action;
            } else if (action === 'create_group') {
                createNewGroup();
            } else if (action === 'delete_group') {
                deleteGroup();
            } else if (action === 'manage_passwords') {
                openPasswordsManager();
            }
        }

        // 5. Функция открытия менеджера паролей и отрисовки таблицы
        function openPasswordsManager() {
            const savedPasswords = JSON.parse(localStorage.getItem('system_passwords')) || {};
            const groups = JSON.parse(localStorage.getItem('my_groups')) || ['8', '9', '10'];
            const tbody = document.getElementById('passwords-table-body');
            
            tbody.innerHTML = '';

            // 1. Сначала выводим строку для самого Администратора
            tbody.innerHTML += `
                <tr>
                    <td><strong>Администратор</strong></td>
                    <td><input type="text" id="pwd-input-admin" value="${savedPasswords['admin'] || 'admin123'}"></td>
                    <td><button class="btn-save-pwd" onclick="saveNewPassword('admin')">Обновить</button></td>
                </tr>
            `;

            // 2. Затем динамически выводим строки для всех существующих групп
            groups.forEach(g => {
                const currentPwd = savedPasswords[g] || "1234"; // Если пароля нет, ставим 1234
                tbody.innerHTML += `
                    <tr>
                        <td>Группа ${g}</td>
                        <td><input type="text" id="pwd-input-${g}" value="${currentPwd}"></td>
                        <td><button class="btn-save-pwd" onclick="saveNewPassword('${g}')">Обновить</button></td>
                    </tr>
                `;
            });

            document.getElementById('manage-pwd-modal').style.display = 'flex';
        }

        // 6. Сохранение измененного пароля в localStorage
        function saveNewPassword(key) {
            const inputVal = document.getElementById(`pwd-input-${key}`).value.trim();
            if (!inputVal) {
                alert("Пароль не может быть пустым!");
                return;
            }

            let savedPasswords = JSON.parse(localStorage.getItem('system_passwords')) || {};
            savedPasswords[key] = inputVal;
            localStorage.setItem('system_passwords', JSON.stringify(savedPasswords));
            
            alert(`Пароль для "${key === 'admin' ? 'Администратора' : 'Группы ' + key}" успешно изменен!`);
            openPasswordsManager(); // Перерисовываем актуальные данные
        }

        // 7. Выход из аккаунта
        function logout() {
            if(confirm("Вы действительно хотите выйти из системы?")) {
                localStorage.removeItem('currentUser');
                sessionStorage.removeItem('admin_authenticated');
                window.location.href = 'login.html';
            }
        }

        // 8. Создание группы
        function createNewGroup() {
            let newGroup = prompt("Введите номер новой группы:");
            if (newGroup) {
                newGroup = newGroup.trim();
                let groups = JSON.parse(localStorage.getItem('my_groups')) || ['8', '9', '10'];
                if (!groups.includes(newGroup)) {
                    groups.push(newGroup);
                    localStorage.setItem('my_groups', JSON.stringify(groups));

                    // Автоматически назначаем новой группе стандартный пароль "1234"
                    let savedPasswords = JSON.parse(localStorage.getItem('system_passwords')) || {};
                    savedPasswords[newGroup] = "1234";
                    localStorage.setItem('system_passwords', JSON.stringify(savedPasswords));

                    alert("Группа " + newGroup + " успешно создана со стандартным паролем '1234'!");
                } else {
                    alert("Такая группа уже существует в реестре!");
                }
            }
        }

        // 9. Удаление группы
        function deleteGroup() {
            let groups = JSON.parse(localStorage.getItem('my_groups')) || ['8', '9', '10'];
            let delGroup = prompt("Введите номер группы, которую нужно УДАЛИТЬ:");
            
            if (delGroup) {
                delGroup = delGroup.trim();
                if (groups.includes(delGroup)) {
                    if (confirm("ВНИМАНИЕ: Все данные группы " + delGroup + " (включая её пароль) будут безвозвратно удалены! Вы уверены?")) {
                        groups = groups.filter(g => g !== delGroup);
                        localStorage.setItem('my_groups', JSON.stringify(groups));
                        localStorage.removeItem('ch_' + delGroup);
                        localStorage.removeItem('at_' + delGroup);
                        
                        // Удаляем пароль группы из базы паролей
                        let savedPasswords = JSON.parse(localStorage.getItem('system_passwords')) || {};
                        delete savedPasswords[delGroup];
                        localStorage.setItem('system_passwords', JSON.stringify(savedPasswords));

                        alert("Группа " + delGroup + " полностью удалена.");
                        location.reload();
                    }
                } else {
                    alert("Группа с таким номером не найдена.");
                }
            }
        }

        // Обработка нажатия Enter в поле ввода пароля администратора
        document.getElementById('admin-password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyPassword();
        });
    </script>
</body>
</html>
